<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoiceResume — Campaign Card 3</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
.card{width:1200px;height:630px;background:#FAFAF8;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:'Inter',sans-serif}
.card::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(30,58,95,0.04) 0%,transparent 70%)}
.card::after{content:'';position:absolute;bottom:-150px;left:-150px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(30,58,95,0.03) 0%,transparent 70%)}
.accent-line{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#1E3A5F,#2A5080,#1E3A5F)}
.content{position:relative;z-index:1;text-align:center;padding:60px 80px;max-width:800px}
.quote-mark{font-family:'EB Garamond',serif;font-size:96px;color:#1E3A5F;line-height:0.6;margin-bottom:24px;opacity:0.15;font-weight:400}
.main-text{font-family:'EB Garamond',serif;font-size:48px;font-weight:500;color:#1D1D1F;line-height:1.2;margin-bottom:20px}
.main-text em{font-style:italic;color:#1E3A5F}
.sub-text{font-size:18px;color:#6E6E73;line-height:1.5;margin-bottom:0}
.divider{width:60px;height:1px;background:#1E3A5F;margin:32px auto;opacity:0.2}
.attribution{font-size:14px;color:#86868B;font-weight:500}
.footer{position:absolute;bottom:28px;left:60px;right:60px;display:flex;justify-content:space-between;align-items:center}
.logo-text{font-family:'EB Garamond',serif;font-size:16px;color:#1E3A5F;font-weight:600}
.url{font-size:13px;color:#86868B}
</style>
</head>
<body>
<div class="card">
<div class="accent-line"></div>
<div class="content">
<div class="quote-mark">"</div>
<div class="main-text">The best time to update<br>your resume was <em>yesterday</em></div>
<div class="sub-text">The second best time is right now. It takes 5 minutes<br>with NoiceResume — and no sign-up.</div>
<div class="divider"></div>
<div class="attribution">Free AI Resume Builder — noiceresume.pages.dev</div>
</div>
<div class="footer"><span class="logo-text">NoiceResume</span><span class="url">8,400+ resumes created this month</span></div>
</div>
</body>
</html>
