<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoiceResume — Campaign Card 1</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
.card{width:1200px;height:630px;background:#1E3A5F;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:'Inter',sans-serif}
.card::before{content:'';position:absolute;top:-200px;right:-150px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.06) 0%,transparent 70%)}
.card::after{content:'';position:absolute;bottom:-100px;left:-100px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.04) 0%,transparent 70%)}
.accent-line{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#C9A84C,#E8D5A3,#C9A84C)}
.content{position:relative;z-index:1;text-align:center;padding:60px 100px;max-width:900px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;background:rgba(255,255,255,0.1);color:#E8D5A3;border-radius:100px;font-size:13px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:36px}
.main-text{font-family:'EB Garamond',serif;font-size:56px;font-weight:500;color:#FFFFFF;line-height:1.15;margin-bottom:20px}
.main-text em{font-style:italic;color:#E8D5A3}
.sub-text{font-size:20px;color:rgba(255,255,255,0.6);line-height:1.5;margin-bottom:0}
.divider{width:60px;height:1px;background:rgba(232,213,163,0.3);margin:32px auto}
.url{font-size:15px;color:rgba(255,255,255,0.4);font-weight:500;letter-spacing:0.3px}
.footer{position:absolute;bottom:28px;left:60px;right:60px;display:flex;justify-content:space-between;align-items:center}
.logo-text{font-family:'EB Garamond',serif;font-size:16px;color:rgba(255,255,255,0.5);font-weight:600}
</style>
</head>
<body>
<div class="card">
<div class="accent-line"></div>
<div class="content">
<div class="badge">Free AI Resume Builder</div>
<div class="main-text">Your resume is missing<br><em>one thing</em></div>
<div class="sub-text">Numbers. If your bullet points don't have metrics,<br>they're responsibilities, not achievements.</div>
<div class="divider"></div>
<div class="url">noiceresume.pages.dev — No sign-up, forever free</div>
</div>
<div class="footer"><span class="logo-text">NoiceResume</span><span class="logo-text">8,400+ resumes this month</span></div>
</div>
</body>
</html>
