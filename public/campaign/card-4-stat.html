<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoiceResume — Campaign Card 4</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
.card{width:1200px;height:630px;background:#1E3A5F;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:'Inter',sans-serif}
.card::before{content:'';position:absolute;top:-150px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%)}
.accent-line{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#C9A84C,#E8D5A3,#C9A84C)}
.content{position:relative;z-index:1;text-align:center;padding:60px 80px}
.stat{font-size:120px;font-weight:800;color:#FFFFFF;line-height:1;margin-bottom:8px;letter-spacing:-2px}
.stat-suffix{font-size:48px;font-weight:600;color:#E8D5A3;font-family:'EB Garamond',serif;font-style:italic}
.main-text{font-size:22px;color:rgba(255,255,255,0.7);line-height:1.4;margin-top:20px;font-weight:400}
.highlight{color:#E8D5A3;font-weight:500}
.divider{width:60px;height:1px;background:rgba(232,213,163,0.2);margin:28px auto}
.sub-text{font-size:15px;color:rgba(255,255,255,0.4);font-weight:400}
.footer{position:absolute;bottom:28px;left:60px;right:60px;display:flex;justify-content:space-between;align-items:center}
.logo-text{font-family:'EB Garamond',serif;font-size:16px;color:rgba(255,255,255,0.5);font-weight:600}
.url{font-size:13px;color:rgba(255,255,255,0.35)}
</style>
</head>
<body>
<div class="card">
<div class="accent-line"></div>
<div class="content">
<div class="stat">8,400+<span class="stat-suffix"> resumes</span></div>
<div class="main-text">created this month. <span class="highlight">100% free.</span><br>No sign-up. No limits. No catch.</div>
<div class="divider"></div>
<div class="sub-text">AI-powered resume builder — noiceresume.pages.dev</div>
</div>
<div class="footer"><span class="logo-text">NoiceResume</span><span class="url">Free Forever</span></div>
</div>
</body>
</html>
