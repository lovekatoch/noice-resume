<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <title>NoiceResume Discord Server Icon</title>
  <desc>NoiceResume server icon — terracotta document with star sparkle on warm cream background</desc>

  <!-- Background circle (Discord rounds icons, so design within this) -->
  <rect width="1024" height="1024" rx="256" fill="#FAF5EF"/>

  <!-- Subtle terracotta halo behind the icon -->
  <circle cx="512" cy="512" r="380" fill="#C75B39" opacity="0.06"/>

  <!-- Document body -->
  <g transform="translate(512, 512)">
    <!-- Document shadow -->
    <rect x="-160" y="-195" width="320" height="390" rx="32" fill="#C75B39" opacity="0.08"/>

    <!-- Main document body -->
    <rect x="-172" y="-205" width="344" height="410" rx="36" fill="#FFFCF7" stroke="#C75B39" stroke-width="8"/>

    <!-- Content lines — simulating resume text -->
    <rect x="-108" y="-130" width="216" height="28" rx="14" fill="#C75B39" opacity="0.50"/>
    <rect x="-108" y="-82" width="160" height="28" rx="14" fill="#C75B39" opacity="0.30"/>
    <rect x="-108" y="-34" width="192" height="28" rx="14" fill="#C75B39" opacity="0.30"/>
    <rect x="-108" y="14" width="140" height="28" rx="14" fill="#C75B39" opacity="0.30"/>
    <rect x="-108" y="62" width="108" height="28" rx="14" fill="#C75B39" opacity="0.20"/>
    <rect x="-108" y="110" width="176" height="28" rx="14" fill="#C75B39" opacity="0.20"/>

    <!-- Star/sparkle accent on the document -->
    <circle cx="120" cy="-155" r="72" fill="#C75B39" opacity="0.08"/>
    <g transform="translate(120, -155)">
      <!-- Star rays -->
      <line x1="0" y1="-48" x2="0" y2="48" stroke="#C75B39" stroke-width="10" stroke-linecap="round"/>
      <line x1="-48" y1="0" x2="48" y2="0" stroke="#C75B39" stroke-width="10" stroke-linecap="round"/>
      <line x1="-34" y1="-34" x2="34" y2="34" stroke="#C75B39" stroke-width="8" stroke-linecap="round"/>
      <line x1="34" y1="-34" x2="-34" y2="34" stroke="#C75B39" stroke-width="8" stroke-linecap="round"/>
      <!-- Star center dot -->
      <circle cx="0" cy="0" r="14" fill="#C75B39"/>
    </g>
  </g>
</svg>
