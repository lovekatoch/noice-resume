<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" fill="none">
  <title>NoiceResume Discord Server Banner</title>
  <desc>NoiceResume server banner — warm gradient with tagline</desc>

  <defs>
    <!-- Warm gradient from dark terracotta to cream -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C75B39"/>
      <stop offset="35%" stop-color="#D97A4A"/>
      <stop offset="65%" stop-color="#E8A56E"/>
      <stop offset="100%" stop-color="#FAF5EF"/>
    </linearGradient>

    <!-- Decorative circle gradient -->
    <radialGradient id="circle-grad-1" cx="0.2" cy="0.8" r="0.6">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="circle-grad-2" cx="0.9" cy="0.2" r="0.5">
      <stop offset="0%" stop-color="#C75B39" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C75B39" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAF5EF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg-grad)"/>

  <!-- Decorative circles -->
  <circle cx="120" cy="440" r="300" fill="url(#circle-grad-1)"/>
  <circle cx="820" cy="120" r="250" fill="url(#circle-grad-2)"/>

  <!-- Subtle dot pattern overlay -->
  <g opacity="0.04">
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#2D2D2D"/>
    </pattern>
    <rect width="960" height="540" fill="url(#dots)"/>
  </g>

  <!-- Logo area — simplified document icon -->
  <g transform="translate(480, 180)">
    <!-- Document icon -->
    <rect x="-40" y="-52" width="80" height="104" rx="10" fill="white" opacity="0.95"/>
    <rect x="-40" y="-52" width="80" height="104" rx="10" stroke="white" stroke-width="3" opacity="0.3"/>
    <rect x="-24" y="-30" width="48" height="7" rx="3.5" fill="#C75B39" opacity="0.6"/>
    <rect x="-24" y="-16" width="36" height="7" rx="3.5" fill="#C75B39" opacity="0.4"/>
    <rect x="-24" y="-2" width="42" height="7" rx="3.5" fill="#C75B39" opacity="0.4"/>
    <rect x="-24" y="12" width="30" height="7" rx="3.5" fill="#C75B39" opacity="0.4"/>
    <rect x="-24" y="26" width="24" height="7" rx="3.5" fill="#C75B39" opacity="0.3"/>
    <rect x="-24" y="40" width="38" height="7" rx="3.5" fill="#C75B39" opacity="0.3"/>

    <!-- Star sparkle -->
    <line x1="28" y1="-40" x2="28" y2="-24" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="-32" x2="36" y2="-32" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <circle cx="28" cy="-32" r="4" fill="white"/>
  </g>

  <!-- Main tagline -->
  <text x="480" y="340" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="800" letter-spacing="-0.03em" fill="url(#text-grad)">
    Resumes that don&apos;t suck.
  </text>

  <!-- Subtitle -->
  <text x="480" y="390" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="400" letter-spacing="0.04em" fill="white" opacity="0.7">
    Free · AI-Powered · No sign-up
  </text>

  <!-- Small decorative line -->
  <line x1="420" y1="420" x2="540" y2="420" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
