<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" fill="none">
  <title>NoiceResume</title>
  <desc>NoiceResume logo with flat undraw-style icon and wordmark</desc>
  <g transform="translate(2, 4)">
    <!-- Document body (undraw-style flat illustration) -->
    <rect x="2" y="6" width="34" height="42" rx="4" fill="#C75B39" opacity="0.12"/>
    <rect x="4" y="8" width="30" height="38" rx="3" fill="#C75B39" opacity="0.25"/>
    <rect x="6" y="10" width="26" height="34" rx="2.5" fill="#FAF5EF" stroke="#C75B39" stroke-width="1.8"/>

    <!-- Document lines -->
    <rect x="11" y="17" width="16" height="2.5" rx="1.25" fill="#C75B39" opacity="0.5"/>
    <rect x="11" y="24" width="12" height="2.5" rx="1.25" fill="#C75B39" opacity="0.35"/>
    <rect x="11" y="31" width="14" height="2.5" rx="1.25" fill="#C75B39" opacity="0.35"/>
    <rect x="11" y="38" width="8" height="2.5" rx="1.25" fill="#C75B39" opacity="0.35"/>

    <!-- Star/sparkle accent -->
    <circle cx="29" cy="13" r="7" fill="#C75B39" opacity="0.15"/>
    <path d="M29 10.5v5M26.5 13h5" stroke="#C75B39" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="29" cy="13" r="1.5" fill="#C75B39"/>
  </g>

  <!-- Wordmark -->
  <text x="48" y="34" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.02em" fill="#2D2D2D">
    <tspan>Noice</tspan><tspan fill="#C75B39">Resume</tspan>
  </text>

  <!-- Tagline dot -->
  <circle cx="48" cy="43" r="2" fill="#C75B39" opacity="0.4"/>
  <text x="55" y="46" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="400" letter-spacing="0.04em" fill="#999">
    BUILD WITH CONFIDENCE
  </text>
</svg>
