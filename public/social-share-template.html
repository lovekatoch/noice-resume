<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoiceResume — Social Share</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
.card{width:1200px;height:630px;background:#FAFAF8;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:'Inter',sans-serif}
.card::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(30,58,95,0.04) 0%,transparent 70%)}
.card::after{content:'';position:absolute;bottom:-150px;left:-150px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(30,58,95,0.03) 0%,transparent 70%)}
.accent-line{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#1E3A5F,#2A5080,#1E3A5F)}
.content{position:relative;z-index:1;text-align:center;padding:60px 80px;max-width:900px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;background:rgba(30,58,95,0.08);color:#1E3A5F;border-radius:100px;font-size:14px;font-weight:500;margin-bottom:32px}
.badge svg{width:14px;height:14px}
.main-text{font-family:'EB Garamond',serif;font-size:52px;font-weight:500;color:#1D1D1F;line-height:1.15;margin-bottom:16px}
.main-text em{font-style:italic;color:#1E3A5F}
.sub-text{font-size:20px;color:#6E6E73;line-height:1.5;margin-bottom:40px}
.divider{width:60px;height:1px;background:#1E3A5F;margin:0 auto 32px;opacity:0.3}
.url{font-size:16px;color:#1E3A5F;font-weight:500;letter-spacing:0.5px}
.footer{position:absolute;bottom:32px;left:60px;right:60px;display:flex;justify-content:space-between;align-items:center}
.logo-text{font-family:'EB Garamond',serif;font-size:18px;color:#1E3A5F;font-weight:600}
.stats{font-size:12px;color:#86868B}
</style>
</head>
<body class="v1">
<div class="card">
<div class="accent-line"></div>
<div class="content">
<div class="badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.5 3.5L17 8l-3.5 1.5L12 13l-1.5-3.5L7 8l3.5-1.5z"/><path d="M18 14l1 2.5L21.5 18l-2.5 1L18 21.5l-1-2.5L14.5 18l2.5-1z"/><path d="M6 11l-.5 1.5L4 13l1.5.5L6 15l.5-1.5L8 13l-1.5-.5z"/></svg>Built with NoiceResume</div>
<div class="main-text">I built my resume with<br><em>NoiceResume</em></div>
<div class="sub-text">Free AI-powered resume builder. No sign-up. No catch.</div>
<div class="divider"></div>
<div class="url">noiceresume.pages.dev</div>
</div>
<div class="footer"><span class="logo-text">NoiceResume</span><span class="stats">8,400+ resumes created this month</span></div>
</div>
</body>
</html>
