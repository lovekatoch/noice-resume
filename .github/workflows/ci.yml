name: CI

on:
  push:
    branches: [main, v2, develop]
  pull_request:
    branches: [main, v2, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - run: npm run test:ci
